# -- Number of replicas (only applies in standalone mode; cluster mode uses this for StatefulSet replicas)
replicaCount: 1

# -- Deployment mode: "standalone" uses a Deployment, "cluster" uses a StatefulSet with ergo clustering
mode: standalone

image:
  # -- Container image repository
  repository: ghcr.io/open-source-cloud/fuse
  # -- Container image tag (pin per release; align with Chart appVersion)
  tag: "0.0.0-dev"
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

serviceAccount:
  # -- Whether to create a service account
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account (auto-generated if empty)
  name: ""

service:
  # -- Kubernetes Service type
  type: ClusterIP
  # -- HTTP API port
  port: 9090
  # -- ClientIP keeps REST clients on one pod when replicaCount>1 (standalone in-memory state).
  # Set to "" to omit (default kube behavior).
  sessionAffinity: ""
  sessionAffinityConfig: {}

cluster:
  # -- If true with mode: standalone, helm render fails (peer list assumes StatefulSet DNS; Deployments use random pod names).
  # Ergo clustering is configured when mode: cluster regardless of this flag.
  enabled: false
  # -- Peer discovery: static (Helm-generated CLUSTER_PEER_NODES) or etcd (BYO registrar for dynamic peers / HPA).
  discoveryMode: static
  # -- etcd logical cluster name (ergo registrar key prefix); required for discoveryMode=etcd
  etcd:
    cluster: default
    # -- Comma-equivalent: list of etcd client endpoints (e.g. http://etcd-client:2379). Leave empty if using existingSecret only.
    endpoints: []
    # -- Secret name containing CLUSTER_ETCD_ENDPOINTS value under existingSecretKey (overrides ConfigMap when set).
    existingSecret: ""
    existingSecretKey: endpoints
  # -- Shared cookie for ergo cluster authentication (Kubernetes Secret, not ConfigMap)
  cookie: "fuse-cluster-secret"
  # -- Port for ergo cluster acceptor (inter-node communication)
  acceptorPort: 15000

# -- HorizontalPodAutoscaler for StatefulSet (requires mode: cluster, cluster.discoveryMode=etcd)
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

database:
  # -- Database driver: "memory" (default, in-process) or "postgres"
  driver: memory
  # -- PostgreSQL connection string (only when driver=postgres)
  dsn: ""
  # -- Max open connections
  maxOpenConns: 25
  # -- Max idle connections
  maxIdleConns: 5
  # -- Connection max lifetime
  connMaxLifetime: 5m

objectStore:
  # -- Object store driver: "memory" (default), "filesystem", or "s3"
  driver: memory
  # -- Optional key prefix for multi-tenant isolation
  keyPrefix: ""
  # -- Base path for filesystem driver
  fsBasePath: /data/fuse
  # -- S3 bucket name
  s3Bucket: fuse-data
  # -- S3 endpoint (e.g. http://minio:9000)
  s3Endpoint: ""
  # -- S3 region
  s3Region: us-east-1
  # -- S3 access key
  s3AccessKey: ""
  # -- S3 secret key
  s3SecretKey: ""
  # -- Use SSL for S3
  s3UseSSL: false

ha:
  # -- Enable HA mode (claim-based workflow distribution across nodes)
  enabled: false
  # -- Node ID (defaults to hostname if empty)
  nodeID: ""
  # -- Heartbeat interval
  heartbeatInterval: 10s
  # -- Claim sweep interval
  claimSweepInterval: 5s
  # -- Lease timeout for stale node detection
  leaseTimeout: 30s

# -- Environment variables injected into the FUSE container via ConfigMap
env:
  LOG_LEVEL: info
  SHUTDOWN_TIMEOUT: 30s

# -- Extra environment variables (list of {name, value} or {name, valueFrom})
extraEnv: []

# -- Container resource requests and limits
resources:
  requests:
    cpu: "1"
    memory: 1Gi
    ephemeral-storage: 128Mi
  limits:
    cpu: "2"
    memory: 2Gi

# -- Pod annotations
podAnnotations: {}

# -- Pod security context
podSecurityContext: {}

# -- Container security context
securityContext: {}

# -- Node selector constraints
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

# -- Liveness probe configuration
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3

# -- Readiness probe configuration
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
