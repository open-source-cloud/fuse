{{- if eq .Values.mode "cluster" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fuse.fullname" . }}-headless
  labels:
    {{- include "fuse.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.cluster.acceptorPort }}
      targetPort: cluster
      protocol: TCP
      name: cluster
  selector:
    {{- include "fuse.selectorLabels" . | nindent 4 }}
{{- end }}
