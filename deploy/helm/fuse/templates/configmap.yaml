{{- if and .Values.cluster.enabled (ne .Values.mode "cluster") }}
{{- fail "fuse chart: cluster.enabled requires mode: cluster. Standalone uses a Deployment with unstable pod hostnames; CLUSTER_PEER_NODES from the chart only matches StatefulSet ordinals." }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fuse.fullname" . }}
  labels:
    {{- include "fuse.labels" . | nindent 4 }}
data:
  HOST: "0.0.0.0"
  PORT: "{{ .Values.service.port }}"
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- if eq .Values.mode "cluster" }}
  CLUSTER_ENABLED: "true"
  CLUSTER_ACCEPTOR_PORT: {{ .Values.cluster.acceptorPort | quote }}
  CLUSTER_HEADLESS_SERVICE_FQDN: {{ printf "%s-headless.%s.svc.cluster.local" (include "fuse.fullname" .) .Release.Namespace | quote }}
  CLUSTER_PEER_NODES: {{ include "fuse.clusterPeerNodes" . | quote }}
  {{- end }}
