{{- if and .Values.cluster.enabled (ne .Values.mode "cluster") }}
{{- fail "fuse chart: cluster.enabled requires mode: cluster. Standalone uses a Deployment with unstable pod hostnames; CLUSTER_PEER_NODES from the chart only matches StatefulSet ordinals." }}
{{- end }}
{{- if and .Values.autoscaling.enabled (eq .Values.cluster.discoveryMode "static") }}
{{- fail "fuse chart: autoscaling.enabled requires cluster.discoveryMode=etcd (static peer list does not track HPA scale)" }}
{{- end }}
{{- if and (eq .Values.mode "cluster") (eq .Values.cluster.discoveryMode "etcd") }}
{{- if and (eq (len .Values.cluster.etcd.endpoints) 0) (not .Values.cluster.etcd.existingSecret) }}
{{- fail "fuse chart: set cluster.etcd.endpoints and/or cluster.etcd.existingSecret when cluster.discoveryMode=etcd" }}
{{- end }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fuse.fullname" . }}
  labels:
    {{- include "fuse.labels" . | nindent 4 }}
data:
  HOST: "0.0.0.0"
  PORT: "{{ .Values.service.port }}"
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  # Database
  DB_DRIVER: {{ .Values.database.driver | quote }}
  DB_MAX_OPEN_CONNS: {{ .Values.database.maxOpenConns | quote }}
  DB_MAX_IDLE_CONNS: {{ .Values.database.maxIdleConns | quote }}
  DB_CONN_MAX_LIFETIME: {{ .Values.database.connMaxLifetime | quote }}
  # Object Store
  OBJECT_STORE_DRIVER: {{ .Values.objectStore.driver | quote }}
  {{- if .Values.objectStore.keyPrefix }}
  OBJECT_STORE_KEY_PREFIX: {{ .Values.objectStore.keyPrefix | quote }}
  {{- end }}
  OBJECT_STORE_FS_BASE_PATH: {{ .Values.objectStore.fsBasePath | quote }}
  OBJECT_STORE_S3_BUCKET: {{ .Values.objectStore.s3Bucket | quote }}
  {{- if .Values.objectStore.s3Endpoint }}
  OBJECT_STORE_S3_ENDPOINT: {{ .Values.objectStore.s3Endpoint | quote }}
  {{- end }}
  OBJECT_STORE_S3_REGION: {{ .Values.objectStore.s3Region | quote }}
  OBJECT_STORE_S3_USE_SSL: {{ .Values.objectStore.s3UseSSL | quote }}
  # HA
  HA_ENABLED: {{ .Values.ha.enabled | quote }}
  {{- if .Values.ha.nodeID }}
  HA_NODE_ID: {{ .Values.ha.nodeID | quote }}
  {{- end }}
  HA_HEARTBEAT_INTERVAL: {{ .Values.ha.heartbeatInterval | quote }}
  HA_CLAIM_SWEEP_INTERVAL: {{ .Values.ha.claimSweepInterval | quote }}
  HA_LEASE_TIMEOUT: {{ .Values.ha.leaseTimeout | quote }}
  {{- if eq .Values.mode "cluster" }}
  CLUSTER_ENABLED: "true"
  CLUSTER_ACCEPTOR_PORT: {{ .Values.cluster.acceptorPort | quote }}
  CLUSTER_HEADLESS_SERVICE_FQDN: {{ printf "%s-headless.%s.svc.cluster.local" (include "fuse.fullname" .) .Release.Namespace | quote }}
  {{- if eq .Values.cluster.discoveryMode "static" }}
  CLUSTER_PEER_NODES: {{ include "fuse.clusterPeerNodes" . | quote }}
  {{- else if eq .Values.cluster.discoveryMode "etcd" }}
  CLUSTER_DISCOVERY_MODE: etcd
  CLUSTER_ETCD_CLUSTER: {{ .Values.cluster.etcd.cluster | quote }}
  {{- if .Values.cluster.etcd.endpoints }}
  CLUSTER_ETCD_ENDPOINTS: {{ join "," .Values.cluster.etcd.endpoints | quote }}
  {{- end }}
  {{- else }}
  {{- fail "fuse chart: cluster.discoveryMode must be static or etcd" }}
  {{- end }}
  {{- end }}
