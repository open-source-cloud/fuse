# nginx load balancer for the FUSE HA cluster (docker-compose "ha" profile).
#
# Fronts the 3 FUSE nodes (fuse-ha-1/2/3, each listening on :9090 inside the
# fuse-network) behind a single endpoint published on the host.
#
# NOTE: active upstream health checks (the `health_check` directive against
# /readyz) require NGINX Plus. This config uses open-source NGINX, so it relies
# on passive health checks (max_fails / fail_timeout): a node that returns
# errors or times out is ejected from rotation for `fail_timeout`.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Docker's embedded DNS, so upstream names resolve even if a node restarts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream fuse_backend {
        # Round-robin across the 3 HA nodes. Swap for `least_conn;` if you
        # prefer fewest-active-connections, or `ip_hash;` for sticky-by-client.
        server fuse-ha-1:9090 max_fails=3 fail_timeout=15s;
        server fuse-ha-2:9090 max_fails=3 fail_timeout=15s;
        server fuse-ha-3:9090 max_fails=3 fail_timeout=15s;

        # Reuse upstream connections (requires HTTP/1.1 + cleared Connection
        # header in the proxy block below).
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Workflow payloads can be sizeable; raise from the 1m default.
        client_max_body_size 25m;

        # LB-local liveness endpoint (does not hit the backends).
        location = /lb-health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"ok"}';
        }

        location / {
            proxy_pass http://fuse_backend;

            # Keepalive to upstream.
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Forwarded request metadata.
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            # Retry the next node on connection/5xx errors from a dead node.
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;

            # Trigger routes allow up to ~30s server-side; give headroom.
            proxy_connect_timeout 5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }
    }
}
