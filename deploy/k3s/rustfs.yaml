apiVersion: v1
kind: Pod
metadata:
  name: fuse-rustfs
  labels:
    app: fuse-rustfs
spec:
  containers:
    - name: rustfs
      image: rustfs/rustfs:latest
      args: ["/data"]
      env:
        - name: RUSTFS_ACCESS_KEY
          value: rustfsadmin
        - name: RUSTFS_SECRET_KEY
          value: rustfsadmin
      ports:
        - containerPort: 9000
      readinessProbe:
        httpGet:
          path: /health
          port: 9000
        initialDelaySeconds: 5
        periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: fuse-rustfs
spec:
  selector:
    app: fuse-rustfs
  ports:
    - port: 9000
      targetPort: 9000
