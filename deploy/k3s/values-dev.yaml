# Development overrides for local k3s/k3d cluster and GitHub E2E (helm -f this file).
# Uses PostgreSQL for shared persistence across replicas, S3 (RustFS) for object store,
# and HA claim-based distribution for multi-replica workflow execution.
replicaCount: 3
mode: standalone

image:
  repository: fuse-app
  tag: dev
  pullPolicy: Never

database:
  driver: postgres
  dsn: "postgres://fuse:fuse@fuse-pg:5432/fuse?sslmode=disable&search_path=fuse_e2e"
  maxOpenConns: 10
  maxIdleConns: 2
  connMaxLifetime: 5m

objectStore:
  driver: s3
  s3Bucket: fuse-e2e
  s3Endpoint: "fuse-rustfs:9000"
  s3Region: us-east-1
  s3AccessKey: rustfsadmin
  s3SecretKey: rustfsadmin
  s3UseSSL: false

ha:
  enabled: true
  heartbeatInterval: 5s
  claimSweepInterval: 3s
  leaseTimeout: 15s

service:
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

env:
  LOG_LEVEL: debug
  SHUTDOWN_TIMEOUT: 10s

resources:
  requests:
    cpu: 100m
    memory: 256Mi
    ephemeral-storage: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
