# Ergo cluster dev (3 nodes, air hot reload):
#   docker compose --profile fuse-dev up --build
#
# HTTP: http://localhost:9091 ..9093 (one port per node). Cluster acceptor: 15000 (internal only).
# Each node name is fuse@fuse-node-{1,2,3} (hostname); override CLUSTER_* env as needed.

x-fuse-dev-common: &fuse-dev-common
  profiles: ["fuse-dev"]
  build:
    context: .
    dockerfile: Dockerfile.dev
  restart: unless-stopped
  working_dir: /app
  volumes:
    - .:/app
  networks:
    - fuse-network
  environment:
    HOST: "0.0.0.0"
    PORT: "9090"
    CLUSTER_ENABLED: "true"
    CLUSTER_COOKIE: "${CLUSTER_COOKIE:-fuse-docker-dev}"
    CLUSTER_ACCEPTOR_PORT: "${CLUSTER_ACCEPTOR_PORT:-15000}"
  healthcheck:
    test: ["CMD", "curl", "-f", "http://127.0.0.1:9090/health"]
    interval: 15s
    timeout: 5s
    retries: 5
    start_period: 90s

services:
  fuse-dev:
    <<: *fuse-dev-common
    container_name: fuse-dev
    hostname: fuse-node-dev
    ports:
      - "9090:9090"

  fuse-dev-1:
    <<: *fuse-dev-common
    container_name: fuse-dev-1
    hostname: fuse-node-1
    ports:
      - "9091:9090"

  fuse-dev-2:
    <<: *fuse-dev-common
    container_name: fuse-dev-2
    hostname: fuse-node-2
    ports:
      - "9092:9090"

  fuse-dev-3:
    <<: *fuse-dev-common
    container_name: fuse-dev-3
    hostname: fuse-node-3
    ports:
      - "9093:9090"

networks:
  fuse-network:
    driver: bridge
