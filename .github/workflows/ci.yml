name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Stage 1: Lint, build, unit tests (no external dependencies)
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
          cache: true
          cache-dependency-path: |
            **/go.sum
            **/go.mod

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.5.0
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install gotestsum
        run: |
          go install gotest.tools/gotestsum@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install swag
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate swagger docs
        run: make swagger

      - name: Run linter
        run: make lint

      - name: Build
        run: make build

      - name: Run tests
        run: make test

      - name: Run tests benchmark
        run: make test-benchmark

      - name: Install Helm
        # Pinned to v4.3.1 (same commit as the @v4 major tag).
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4

      - name: Helm lint
        run: helm lint deploy/helm/fuse/

      - name: Helm template validation
        run: helm template fuse deploy/helm/fuse/ --values deploy/helm/fuse/values.yaml > /dev/null

  # Stage 2: Functional tests (contract tests against real PostgreSQL)
  functional:
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: fuse
          POSTGRES_PASSWORD: fuse
          POSTGRES_DB: fuse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fuse"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DB_POSTGRES_DSN: postgres://fuse:fuse@localhost:5432/fuse?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
          cache: true
          cache-dependency-path: |
            **/go.sum
            **/go.mod

      - name: Install gotestsum
        run: |
          go install gotest.tools/gotestsum@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Run functional tests
        run: make test-functional
