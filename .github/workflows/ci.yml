name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
          cache: true
          cache-dependency-path: |
            **/go.sum
            **/go.mod

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.5.0
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install gotestsum
        run: |
          go install gotest.tools/gotestsum@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install swag
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate swagger docs
        run: make swagger

      - name: Run tests
        run: make test

      - name: Run tests benchmark
        run: make test-benchmark

      - name: Run linter
        run: make lint

      - name: Build
        run: make build

      - name: Integration Tests
        env:
          DB_DRIVER: mongodb
          DB_URL: mongodb://admin:password@localhost:27017
          DB_NAME: fuse_test
          DB_TEST_CONNECTION: "true"
        run: go test -tags integration -v -count=1 ./internal/repositories/...

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint deploy/helm/fuse/

      - name: Helm template validation
        run: helm template fuse deploy/helm/fuse/ --values deploy/helm/fuse/values.yaml > /dev/null
