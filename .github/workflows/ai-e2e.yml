name: AI E2E

# Runs the example AI workflows (ai/agent, and any future ai/chat examples) against a real,
# local Ollama model — exercising the LLM provider layer, the agent reasoning loop, and
# tool-calling end to end.
#
# Deliberately OFF the per-PR critical path (pulling a model is minutes): this runs nightly,
# on demand, on pushes to main, and on PRs that carry the "ai-e2e" label. The model is cached.

on:
  schedule:
    - cron: "0 3 * * *" # nightly 03:00 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read

concurrency:
  group: ai-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ai-e2e:
    name: "AI workflows vs Ollama"
    # On PRs, only when labeled "ai-e2e"; always for main pushes, nightly, and manual runs.
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'ai-e2e')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      OLLAMA_MODEL: "llama3.1:8b" # small, stable tool-calling model (avoid qwen3/llama3.2-vision)
      OLLAMA_HOST: "127.0.0.1:11434"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
          cache: true
          cache-dependency-path: |
            **/go.sum
            **/go.mod

      - name: Build fuse
        run: make build

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-${{ env.OLLAMA_MODEL }}

      - name: Install and start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          # The installer may start a systemd service bound to :11434 as the 'ollama' user
          # (models under /usr/share/ollama). Stop it and run our own serve as the runner user
          # so models land in ~/.ollama and the cache step above applies.
          sudo systemctl stop ollama 2>/dev/null || true
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf "http://${OLLAMA_HOST}/api/tags" >/dev/null && break
            sleep 1
          done
          ollama pull "${OLLAMA_MODEL}"

      - name: Start fuse server (in-memory) against Ollama
        env:
          LLM_DEFAULT_PROVIDER: "ollama"
          LLM_OLLAMA_ENABLED: "true"
          LLM_OLLAMA_BASE_URL: "http://127.0.0.1:11434/v1"
          LLM_OLLAMA_MODEL: ${{ env.OLLAMA_MODEL }}
        run: |
          # Single-node, in-memory mode (no Postgres/S3/etcd needed for workflow execution).
          ./bin/fuse server -l debug -p 9090 > /tmp/fuse.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:9090/health >/dev/null && break
            sleep 1
          done

      - name: Run AI e2e tests
        env:
          AI_E2E: "true"
          E2E_API_URL: "http://localhost:9090"
        run: go test -tags=e2e ./tests/e2e -run TestAIAgentExample_E2E -v -count=1 -timeout 20m

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "::group::ollama"; tail -n 200 /tmp/ollama.log 2>/dev/null || true; echo "::endgroup::"
          echo "::group::fuse";   tail -n 300 /tmp/fuse.log   2>/dev/null || true; echo "::endgroup::"
