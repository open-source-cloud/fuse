x-fuse-env: &fuse-env
  HOST: "0.0.0.0"
  PORT: "9090"
  LOG_LEVEL: "debug"
  SHUTDOWN_TIMEOUT: "10s"
  DB_DRIVER: "postgres"
  DB_POSTGRES_DSN: "postgres://fuse:fuse@fuse-pg:5432/fuse?sslmode=disable&search_path=fuse_e2e"
  DB_MAX_OPEN_CONNS: "10"
  DB_MAX_IDLE_CONNS: "2"
  DB_CONN_MAX_LIFETIME: "5m"
  OBJECT_STORE_DRIVER: "s3"
  OBJECT_STORE_S3_BUCKET: "fuse-e2e"
  OBJECT_STORE_S3_ENDPOINT: "fuse-s3:9000"
  OBJECT_STORE_S3_REGION: "us-east-1"
  OBJECT_STORE_S3_ACCESS_KEY: "rustfsadmin"
  OBJECT_STORE_S3_SECRET_KEY: "rustfsadmin"
  OBJECT_STORE_S3_USE_SSL: "false"
  HA_ENABLED: "true"
  HA_HEARTBEAT_INTERVAL: "5s"
  HA_CLAIM_SWEEP_INTERVAL: "3s"
  HA_LEASE_TIMEOUT: "15s"

x-fuse-service: &fuse-service
  image: fuse-app:test
  restart: "no"
  networks:
    - e2e
  depends_on:
    fuse-migrate:
      condition: service_completed_successfully
    fuse-s3:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "/fuse", "health"]
    interval: 5s
    timeout: 3s
    retries: 10
    start_period: 10s

services:
  fuse-pg:
    image: postgres:17
    environment:
      POSTGRES_USER: fuse
      POSTGRES_PASSWORD: fuse
      POSTGRES_DB: fuse
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    command:
      - "postgres"
      - "-c"
      - "log_statement=none"
    networks:
      - e2e
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuse"]
      interval: 3s
      timeout: 3s
      retries: 10

  fuse-pg-init:
    image: postgres:17
    restart: "no"
    entrypoint:
      [
        "sh",
        "-c",
        "PGPASSWORD=fuse psql -h fuse-pg -U fuse -d fuse -c 'CREATE SCHEMA IF NOT EXISTS fuse_e2e'",
      ]
    networks:
      - e2e
    depends_on:
      fuse-pg:
        condition: service_healthy

  fuse-s3:
    image: rustfs/rustfs:latest
    environment:
      ACCESS_KEY: rustfsadmin
      SECRET_KEY: rustfsadmin
    command:
      ["server", "--host", "0.0.0.0", "--port", "9000", "--auto-create-bucket"]
    networks:
      - e2e
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9000/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  fuse-migrate:
    image: fuse-app:test
    command: ["/fuse", "migrate"]
    restart: "no"
    environment:
      DB_POSTGRES_DSN: "postgres://fuse:fuse@fuse-pg:5432/fuse?sslmode=disable&search_path=fuse_e2e"
    networks:
      - e2e
    depends_on:
      fuse-pg-init:
        condition: service_completed_successfully

  fuse-1:
    <<: *fuse-service
    container_name: fuse-1
    ports:
      - "9090:9090"
    environment:
      <<: *fuse-env

  fuse-2:
    <<: *fuse-service
    container_name: fuse-2
    ports:
      - "9091:9090"
    environment:
      <<: *fuse-env

  fuse-3:
    <<: *fuse-service
    container_name: fuse-3
    ports:
      - "9092:9090"
    environment:
      <<: *fuse-env

networks:
  e2e:
    driver: bridge
