# SonarCloud (no secrets — use SONAR_TOKEN in the environment).
# Org and project keys: SonarCloud project sidebar.
sonar.organization=open-source-cloud
sonar.projectKey=open-source-cloud_fuse
sonar.host.url=https://sonarcloud.io

sonar.sources=.
sonar.exclusions=**/vendor/**,**/bin/**,**/.git/**,**/.cursor/**

# Helm/k3s values: cluster.cookie and similar are ergo tokens, not user passwords (yaml:S2068).
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=yaml:S2068
sonar.issue.ignore.multicriteria.e1.resourceKey=**/deploy/**/values*.yaml

sonar.sourceEncoding=UTF-8

# EU is the default. For US-hosted organizations only, set either:
#   SONAR_REGION=us make sonar-local
# or uncomment the next line:
# sonar.region=us
