# air (https://github.com/air-verse/air) — hot reload for local / Docker dev.
# Build output lives under /tmp so bind-mounted ./tmp is not required per replica.

root = "."
tmp_dir = "/tmp/fuse-air"

[build]
  entrypoint = ["/tmp/fuse-air/fuse"]
  cmd = "go build -buildvcs=false -o /tmp/fuse-air/fuse ./cmd/fuse/main.go"
  args_bin = ["server", "-l", "debug"]
  delay = 500
  exclude_dir = ["bin", "tmp", "vendor", "testdata", ".git", "deploy", "examples"]
  include_ext = ["go", "mod", "sum"]

[log]
  main_only = false

[misc]
  clean_on_exit = true
